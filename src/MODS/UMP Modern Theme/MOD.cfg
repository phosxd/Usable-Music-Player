[TesseractMod]
type="theme"
id="UMP Modern Theme"
name="Modern"
author="UMP"
version_string="1.0.0"
version_number=1
for_game_versions=[1]
for_tesseract_versions=[1]
description_short="A ore modern theme with a cleaner style."

real_path="res://MODS/UMP Modern Theme/"


[Theme]
variants=[
	"Dark",
	"Light"
]
